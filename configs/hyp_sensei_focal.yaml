# Classic YOLOv5 hyperparameters — FOCAL / imbalance-aware arm (arm B).
# Changes vs baseline target the insect-monitoring failure modes (background-dominated
# tiles, rare/mimic species, tiny objects), all training-time only (inference graph and thus
# measured energy unchanged):
#   * fl_gamma 1.5         -> focal loss on obj+cls: down-weights easy empty-background
#                             negatives, focuses on hard positives (rare species, mimics).
#   * box 0.05 -> 0.03     -> de-emphasise box regression (task is counting, not tight boxes).
#   * copy_paste / mixup   -> lift rare-class instance counts (Eristalis, Aglais).
# Run this arm with `--image-weights` (class-frequency image sampling) for class balance.
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1
box: 0.03              # lower: box precision matters less for counting
cls: 0.5
cls_pw: 1.0
obj: 1.0
obj_pw: 1.0
iou_t: 0.20
anchor_t: 4.0
fl_gamma: 1.5          # focal loss (imbalance + hard mimics)
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.1             # help rare classes
copy_paste: 0.1        # help rare/tiny classes
