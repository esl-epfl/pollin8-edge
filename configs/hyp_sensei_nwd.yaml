# Classic YOLOv5 hyperparameters — NWD / tiny-object arm (arm C).
# = focal arm (arm B) PLUS a Normalized Wasserstein Distance box-loss blend, which is far
# more stable than IoU for few-pixel insects. Requires the repo to be patched once with
# scripts/patch_yolov5_nwd.py; nwd_ratio>0 activates the blend (inference graph unchanged).
# Run this arm with `--image-weights` (class balance), same as arm B.
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1
box: 0.03
cls: 0.5
cls_pw: 1.0
obj: 1.0
obj_pw: 1.0
iou_t: 0.20
anchor_t: 4.0
fl_gamma: 1.5
nwd_ratio: 0.5         # blend CIoU(0.5) + NWD(0.5); tiny-object box loss
nwd_c: 5.0             # Gaussian normaliser in grid units (tune per autoanchor if needed)
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.1
copy_paste: 0.1
