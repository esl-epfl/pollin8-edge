# Classic YOLOv5 hyperparameters — BASELINE arm (arm A) for the SENSEI-arch sweep.
# Stock yolov5 scratch-low values; no focal loss, default loss weighting. This is the
# control against which the focal/class-balanced arm (hyp_sensei_focal.yaml) is ablated.
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1
box: 0.05
cls: 0.5
cls_pw: 1.0
obj: 1.0
obj_pw: 1.0
iou_t: 0.20
anchor_t: 4.0
fl_gamma: 0.0          # no focal loss (baseline)
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.0
copy_paste: 0.0
